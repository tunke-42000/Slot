<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PEKA Slot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="machine">
      <!-- Lamp Area (Top) -->
      <div id="lamp-section">
        <div id="peka-lamp" class="lamp-off">
          <div class="lamp-inner"></div>
        </div>
      </div>

      <!-- Displays Area -->
      <div id="display-section">
        <div class="display-box">
          <span class="label">CREDIT</span>
          <span class="lcd-text" id="credit-display">50</span>
        </div>
        <div class="display-box">
          <span class="label">PAYOUT</span>
          <span class="lcd-text" id="payout-display">0</span>
        </div>
      </div>

      <!-- Reels Area -->
      <div id="reels-section">
        <!-- Payline Guides (faint overlaid lines) -->
        <div class="payline-guide" id="line-1"></div>
        <div class="payline-guide" id="line-2"></div>
        <div class="payline-guide" id="line-3"></div>
        <div class="payline-guide" id="line-4"></div>
        <div class="payline-guide" id="line-5"></div>

        <div class="reel-window" id="reel-0">
          <div class="reel-strip" id="strip-0"></div>
        </div>
        <div class="reel-window" id="reel-1">
          <div class="reel-strip" id="strip-1"></div>
        </div>
        <div class="reel-window" id="reel-2">
          <div class="reel-strip" id="strip-2"></div>
        </div>
      </div>

      <!-- Controls Area -->
      <div id="controls-section">
        <div id="lever-area">
          <button id="spin-lever" class="metal-button">
            <div class="lever-cap">SPIN</div>
          </button>
        </div>
        
        <div id="stops-area">
          <!-- 1 = 1 line, 2 = 3 lines, 3 = 5 lines -->
          <button class="bet-btn metal-button" id="btn-bet-1">1</button>
          <button class="bet-btn metal-button" id="btn-bet-3">2</button>
          <button class="bet-btn metal-button" id="btn-bet-5">3</button>
        </div>
      </div>
      
    </div>
  </div>
  
  <script src="audio.js"></script>
  <script src="script.js"></script>
</body>
</html>
